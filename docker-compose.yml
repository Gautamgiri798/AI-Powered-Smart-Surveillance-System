version: '3.8'

services:
  backend:
    build: ./backend
    container_name: safetysnap-backend
    ports:
      - "5000:5000"
    environment:
      - SECRET_KEY=safetysnap-production-secret
      - SQLITE_DB=/app/data/safetysnap.db
    restart: unless-stopped
    volumes:
      - sqlite_data:/app/data
    networks:
      - safetysnap-net

  frontend:
    build: ./frontend
    container_name: safetysnap-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - safetysnap-net

volumes:
  sqlite_data:

networks:
  safetysnap-net:
    driver: bridge
